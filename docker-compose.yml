# @faridguzman91: Docker Compose for the engage relay server.
# The Tauri desktop client runs natively — only the server is containerised.
#
# Usage:
#   docker compose up -d          — start server in background
#   docker compose logs -f        — tail server logs
#   docker compose down           — stop and remove containers
#   docker compose down -v        — also remove the database volume
#
# Required: copy engage-server/.env.example → .env and fill in credentials.
# The .env file is mounted read-only so secrets never bake into the image.

services:
  server:
    build:
      context: ../engage-server
      dockerfile: Dockerfile
    container_name: engage-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../engage-server/.env
    environment:
      PORT: "3000"
      DATABASE_PATH: "/data/engage-server.db"
      RUST_LOG: "engage_server=info,tower_http=warn"
    volumes:
      - engage_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/google"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  engage_data:
    driver: local
